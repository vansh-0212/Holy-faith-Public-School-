<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Achievers Gallery | Holy Faith Public School</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <main class="gallery-container">
        
        <a href="./index.html" class="back-link">Back to home</a>

        <header>
            <h1 class="main-title">Congratulations for Achieving <span>A Grade</span></h1>
            <p class="subtitle">Our Shining Stars of Success</p>
        </header>
        
        <div class="gallery-grid">
            
            <div class="achiever-card">
                <div class="badge-tag">5th Class</div>
                <div class="card-image-wrapper">
                    <img src="./hfps 1.png" alt="Diksha Kumawat" class="card-img">
                    <div class="grade-badge">A</div>
                </div>
                <div class="card-info">
                    <h2 class="student-name">Diksha Kumawat</h2>
                    <div class="curious-reveal">
                        <p class="parent-name">D/O Mukesh Kumawat</p>
                        <p class="slogan">"Hum Neev Banate Hain"</p>
                    </div>
                    <button type="button" class="explore-btn">View Achievement</button>
                </div>
            </div>

            <div class="achiever-card">
                <div class="badge-tag">8th Class</div>
                <div class="card-image-wrapper">
                    <img src="./hfps 2.png" alt="Riya Bano" class="card-img">
                    <div class="grade-badge">A</div>
                </div>
                <div class="card-info">
                    <h2 class="student-name">Riya Bano</h2>
                    <div class="curious-reveal">
                        <p class="parent-name">D/O Ramjan Ali</p>
                        <p class="slogan">"Hum Neev Banate Hain"</p>
                    </div>
                    <button type="button" class="explore-btn">View Achievement</button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
